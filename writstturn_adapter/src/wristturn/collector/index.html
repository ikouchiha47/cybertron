<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WristTurn Collector</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: ui-monospace, monospace;
  background: #0e1117;
  color: #e2e8f0;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
header h1 { font-size: 14px; font-weight: 600; letter-spacing: .4px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #f85149; transition: background .3s; }
.dot.on { background: #3fb950; }
#device-name { font-size: 11px; color: #8b949e; }

#rec-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
#label-input {
  background: #0e1117;
  border: 1px solid #30363d;
  border-radius: 5px;
  color: #e2e8f0;
  font-family: inherit;
  font-size: 12px;
  padding: 5px 10px;
  width: 200px;
  outline: none;
}
#label-input:focus { border-color: #58a6ff; }
#label-input::placeholder { color: #484f58; }

button {
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  padding: 5px 14px;
}
button:disabled { opacity: .35; cursor: default; }
#btn-record { background: #da3633; color: #fff; }
#btn-pause  { background: #d29922; color: #fff; }
#btn-resume { background: #388bfd; color: #fff; display: none; }
#btn-stop   { background: #444c56; color: #e2e8f0; }

#rec-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 10px;
  font-size: 11px;
  color: #8b949e;
}
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
.rec-dot.recording { background: #da3633; animation: blink 1s step-start infinite; }
.rec-dot.paused    { background: #d29922; }
@keyframes blink { 50% { opacity: 0; } }

#rec-stats { margin-left: auto; font-size: 11px; color: #8b949e; }

main {
  display: grid;
  grid-template-columns: 1fr 340px;
  overflow: hidden;
}
#chart-wrap { padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
#live-plot  { flex: 1; min-height: 0; }

#session-panel {
  border-left: 1px solid #30363d;
  background: #161b22;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#session-panel h2 {
  font-size: 11px;
  color: #8b949e;
  padding: 12px 14px 8px;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid #30363d;
}
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
.sess-item {
  background: #1f2937;
  border: 1px solid #30363d;
  border-radius: 6px;
  margin-bottom: 8px;
  font-size: 11px;
  overflow: hidden;
}
.sess-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
}
.sess-meta { color: #8b949e; }
.sess-plot  { height: 110px; }
.sess-label-row {
  display: flex;
  gap: 5px;
  padding: 6px 8px;
  border-top: 1px solid #30363d;
  background: #0e1117;
}
.sess-label-row input {
  flex: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #e2e8f0;
  font-family: inherit;
  font-size: 11px;
  padding: 4px 7px;
  outline: none;
}
.sess-label-row input:focus { border-color: #58a6ff; }
.sess-label-row button {
  background: #238636;
  font-size: 11px;
  padding: 4px 9px;
}
.sess-label-row button:hover { background: #2ea043; }

footer {
  padding: 6px 20px;
  background: #161b22;
  border-top: 1px solid #30363d;
  font-size: 11px;
  color: #8b949e;
  display: flex;
  gap: 20px;
  align-items: center;
}
#log { margin-left: auto; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="dot" id="dot"></div>
  <h1>WristTurn Collector</h1>
  <span id="device-name">disconnected</span>
</header>

<div id="rec-bar">
  <input id="label-input" type="text" placeholder="label (e.g. n, w, circle)">
  <button id="btn-record">⏺ Record</button>
  <button id="btn-pause"  disabled>⏸ Pause</button>
  <button id="btn-resume" disabled>▶ Resume</button>
  <button id="btn-stop"   disabled>⏹ Stop</button>
  <div id="rec-indicator">
    <div class="rec-dot" id="rec-dot"></div>
    <span id="rec-label-disp">idle</span>
  </div>
  <div id="rec-stats">
    samples: <span id="stat-samples">0</span>
    &nbsp;·&nbsp;
    elapsed: <span id="stat-elapsed">0s</span>
  </div>
</div>

<main>
  <div id="chart-wrap">
    <div id="live-plot"></div>
  </div>
  <div id="session-panel">
    <h2>Saved sessions <span id="sess-count" style="color:#e2e8f0">0</span></h2>
    <div id="session-list"></div>
  </div>
</main>

<footer>
  <div>live samples: <span id="stat-live">0</span></div>
  <div id="log">connecting...</div>
</footer>

<script>
// ── Live chart ────────────────────────────────────────────────────────────────
const MAX_PTS = 400;
const liveRoll = [], livePitch = [], liveYaw = [];
let liveSampleCount = 0;

Plotly.newPlot("live-plot", [
  { name: "roll",  y: [], mode: "lines", line: { color: "#f87171", width: 1.5 } },
  { name: "pitch", y: [], mode: "lines", line: { color: "#34d399", width: 1.5 } },
  { name: "yaw",   y: [], mode: "lines", line: { color: "#60a5fa", width: 1.5 } },
], {
  paper_bgcolor: "transparent",
  plot_bgcolor:  "#0e1117",
  font:   { color: "#8b949e", size: 10 },
  margin: { t: 8, r: 8, b: 28, l: 42 },
  xaxis:  { showgrid: false, zeroline: false, showticklabels: false },
  yaxis:  { gridcolor: "#21262d", zeroline: true, zerolinecolor: "#30363d",
            title: { text: "°", font: { size: 10 } } },
  legend: { orientation: "h", y: -0.1 },
}, { responsive: true, displayModeBar: false });

function pushLive(roll, pitch, yaw) {
  liveRoll.push(roll); livePitch.push(pitch); liveYaw.push(yaw);
  if (liveRoll.length > MAX_PTS) { liveRoll.shift(); livePitch.shift(); liveYaw.shift(); }
  Plotly.restyle("live-plot", { y: [liveRoll] }, [0]);
  Plotly.restyle("live-plot", { y: [livePitch] }, [1]);
  Plotly.restyle("live-plot", { y: [liveYaw] }, [2]);
}

// ── Recording controls ────────────────────────────────────────────────────────
let recState = "idle";
let elapsedTimer = null;
let recStartWall = 0;

const btnRecord = document.getElementById("btn-record");
const btnPause  = document.getElementById("btn-pause");
const btnResume = document.getElementById("btn-resume");
const btnStop   = document.getElementById("btn-stop");
const recDot    = document.getElementById("rec-dot");
const recDisp   = document.getElementById("rec-label-disp");
const labelIn   = document.getElementById("label-input");

function applyState(state, extra) {
  recState = state;
  recDot.className = "rec-dot " + (state === "idle" ? "" : state);

  btnRecord.disabled = state !== "idle";
  btnPause.disabled  = state !== "recording";
  btnResume.disabled = state !== "paused";
  btnStop.disabled   = state === "idle";
  btnPause.style.display  = state === "paused" ? "none"         : "inline-block";
  btnResume.style.display = state === "paused" ? "inline-block" : "none";

  if (state === "recording") {
    recStartWall = Date.now();
    recDisp.textContent = labelIn.value.trim() || "recording…";
    clearInterval(elapsedTimer);
    elapsedTimer = setInterval(() => {
      document.getElementById("stat-elapsed").textContent =
        ((Date.now() - recStartWall) / 1000).toFixed(1) + "s";
    }, 200);
  } else if (state === "paused") {
    clearInterval(elapsedTimer);
    recDisp.textContent = "paused";
  } else {
    clearInterval(elapsedTimer);
    recDisp.textContent = "idle";
    document.getElementById("stat-samples").textContent = "0";
    document.getElementById("stat-elapsed").textContent = "0s";
    if (extra?.samples !== undefined) {
      setLog(`stopped — ${extra.samples} samples sent to saver`);
    }
  }
}

btnRecord.onclick = () => ws.send(JSON.stringify({ type: "record_start", label: labelIn.value.trim() }));
btnPause.onclick  = () => ws.send(JSON.stringify({ type: "record_pause" }));
btnResume.onclick = () => ws.send(JSON.stringify({ type: "record_resume" }));
btnStop.onclick   = () => ws.send(JSON.stringify({ type: "record_stop",  label: labelIn.value.trim() }));

// ── Session list ──────────────────────────────────────────────────────────────
let sessCount = 0;

function addSession(data) {
  sessCount++;
  document.getElementById("sess-count").textContent = sessCount;

  const el = document.createElement("div");
  el.className = "sess-item";

  const plotId = `splot-${data.id}`;

  el.innerHTML = `
    <div class="sess-header">
      <span class="sess-label-disp" style="font-weight:600;color:#e2e8f0">${data.label || "unlabelled"}</span>
      <span class="sess-meta">${data.samples} samples</span>
    </div>
    <div class="sess-plot" id="${plotId}"></div>
    <div class="sess-label-row">
      <input type="text" value="${data.label || ""}" placeholder="label…">
      <button>Save label</button>
    </div>
  `;

  document.getElementById("session-list").prepend(el);

  // Render waveform from the session's samples (fetched from server)
  renderSessionPlot(plotId, data.id);

  // Save-label button
  const input = el.querySelector("input");
  el.querySelector("button").onclick = () => {
    const newLabel = input.value.trim();
    if (!newLabel) return;
    ws.send(JSON.stringify({ type: "relabel", id: data.id, label: newLabel }));
    el.querySelector(".sess-label-disp").textContent = newLabel;
  };
}

async function renderSessionPlot(plotId, sessionId) {
  try {
    const resp = await fetch(`/session/${sessionId}`);
    if (!resp.ok) return;
    const { samples } = await resp.json();
    if (!samples || !samples.length) return;

    const ts    = samples.map(s => s.t);
    const roll  = samples.map(s => s.roll);
    const pitch = samples.map(s => s.pitch);
    const yaw   = samples.map(s => s.yaw);

    await Plotly.newPlot(plotId, [
      { name: "roll",  x: ts, y: roll,  mode: "lines", line: { color: "#f87171", width: 1 } },
      { name: "pitch", x: ts, y: pitch, mode: "lines", line: { color: "#34d399", width: 1 } },
      { name: "yaw",   x: ts, y: yaw,   mode: "lines", line: { color: "#60a5fa", width: 1 } },
    ], {
      paper_bgcolor: "transparent",
      plot_bgcolor:  "#0e1117",
      font:    { color: "#8b949e", size: 9 },
      margin:  { t: 4, r: 4, b: 20, l: 32 },
      xaxis:   { showgrid: false, zeroline: false, title: { text: "ms", font: { size: 9 } } },
      yaxis:   { gridcolor: "#21262d", zeroline: false },
      showlegend: false,
    }, { responsive: true, displayModeBar: false });
    Plotly.Plots.resize(document.getElementById(plotId));
  } catch (_) {}
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
function setLog(t) { document.getElementById("log").textContent = t; }

function connect() {
  ws = new WebSocket("ws://localhost:8080/ws");
  ws.onopen  = () => setLog("server connected");
  ws.onclose = () => {
    document.getElementById("dot").classList.remove("on");
    document.getElementById("device-name").textContent = "disconnected";
    setLog("server disconnected — retrying…");
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    if (msg.type === "status") {
      document.getElementById("dot").classList.toggle("on", msg.connected);
      document.getElementById("device-name").textContent =
        msg.connected ? (msg.device || "device") : "disconnected";
      setLog(msg.connected ? `BLE: ${msg.device}` : "BLE disconnected");
    }
    else if (msg.type === "sample") {
      liveSampleCount++;
      document.getElementById("stat-live").textContent = liveSampleCount;
      pushLive(msg.roll, msg.pitch, msg.yaw);
    }
    else if (msg.type === "rec_state") {
      applyState(msg.state, msg);
    }
    else if (msg.type === "rec_progress") {
      document.getElementById("stat-samples").textContent = msg.samples;
    }
    else if (msg.type === "saved") {
      addSession(msg);
      setLog(`saved → ${msg.path}`);
    }
  };
}

connect();
</script>
</body>
</html>
